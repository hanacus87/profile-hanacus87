<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>hanacus87</title>
    <link rel="icon" type="image/svg+xml" href="/hana.svg" />
    <link
      rel="preload"
      href="/fonts/jetbrains-mono-latin-400-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <button
        type="button"
        class="hana-disc"
        id="hana-disc"
        aria-haspopup="dialog"
        aria-controls="whoami-modal"
        aria-label="Open the &quot;Who was I?&quot; puzzle"
      >
        <img src="/hana.svg" alt="" />
      </button>

      <pre
        class="diff"
      ><code><span class="line del">- &lt;whoami&gt;ec07d733adeecee47a5573f257db6005&lt;/whoami&gt;</span><span class="line add" id="whoami-reveal">+ &lt;whoami&gt;?&lt;/whoami&gt;</span></code></pre>

      <ul class="links">
        <li>
          <span class="icon icon-github" aria-hidden="true"></span>
          <strong>GitHub</strong>:
          <a href="https://github.com/hanacus87">@hanacus87</a>
        </li>
        <li>
          <span class="icon icon-hackthebox" aria-hidden="true"></span>
          <strong>HackTheBox</strong>:
          <a href="https://app.hackthebox.com/public/users/2983141"
            >@hanacus87</a
          >
        </li>
        <li>
          <span class="icon icon-zenn" aria-hidden="true"></span>
          <strong>Zenn</strong>:
          <a href="https://zenn.dev/hanacus87">@hanacus87</a>
        </li>
      </ul>

      <table>
        <caption>
          Published CVE
        </caption>
        <thead>
          <tr>
            <th>CVE ID</th>
            <th>Title</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>
              <a href="https://www.cve.org/CVERecord?id=CVE-2026-54286"
                >CVE-2026-54286</a
              >
            </td>
            <td>
              hono: Path traversal in <code>serve-static</code> on Windows via
              encoded backslash (<code>%5C</code>)
            </td>
            <td>2026-06-09</td>
          </tr>
        </tbody>
      </table>

      <dialog
        id="whoami-modal"
        class="whoami-modal"
        aria-labelledby="whoami-title"
      >
        <form class="whoami-form">
          <h2 id="whoami-title" class="whoami-title">Who was I?</h2>
          <input
            id="whoami-input"
            name="answer"
            type="text"
            aria-label="answer"
            class="whoami-input"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
          />
          <div class="whoami-actions">
            <button type="submit" class="whoami-button">submit</button>
          </div>
        </form>
      </dialog>
    </main>
    <script type="module" src="/whoami.js"></script>
  </body>
</html>
